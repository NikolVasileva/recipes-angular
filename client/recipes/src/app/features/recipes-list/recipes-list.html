<div class="container-fluid service py-6">
    <div class="container">
        <div class="text-center wow bounceInUp" data-wow-delay="0.1s"
            style="visibility: visible; animation-delay: 0.1s; animation-name: bounceInUp;">
            <small
                class="d-inline-block fw-bold text-dark text-uppercase bg-light border border-primary rounded-pill px-4 py-1 mb-3">Delicious</small>
            <h1 class="display-5 mb-5">Choose recipe</h1>
        </div>
        <div class="row g-4">
            <div class="col-lg-3 col-md-6 col-sm-12" *ngFor="let recipe of (recipes$ | async)">
                <app-recipes-item [recipe]="recipe"></app-recipes-item>
            </div>
        </div>
    </div>
</div>
