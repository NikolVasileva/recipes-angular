<div *ngIf="recipe$ | async as recipe" class="container-fluid py-6">
  <div class="container">
    <div class="row g-5 align-items-center">

      <div class="col-lg-5">
        <img [src]="recipe.imageUrl" [alt]="recipe.title" class="img-fluid rounded">
      </div>

      <div class="col-lg-7">

        <small
          class="d-inline-block fw-bold text-dark text-uppercase bg-light border border-primary rounded-pill px-4 py-1 mb-3">
          About recipe
        </small>

        <h1 class="display-5 mb-4">{{ recipe.title }}</h1>
        <p class="mb-4">{{ recipe.description }}</p>

        <div class="row g-4 text-dark mb-5">
          <div class="col-sm-6">
            <i class="fas fa-share text-primary me-2"></i>
            Ingredients: {{ recipe.ingredients }}
          </div>

          <div class="col-sm-6">
            <i class="fas fa-share text-primary me-2"></i>
            Servings: {{ recipe.servings }}
          </div>

          <div class="col-sm-6">
            <i class="fas fa-share text-primary me-2"></i>
            Cooking time: {{ recipe.cookTime }} min
          </div>

          <div class="col-sm-6">
            <i class="fas fa-share text-primary me-2"></i>
            Difficulty: {{ recipe.difficulty }}
          </div>
        </div>

        <div *ngIf="isOwner(recipe)">

          <a [routerLink]="['/recipes/edit', recipe._id]" class="btn btn-primary py-3 px-5 rounded-pill me-2">
            Edit
          </a>

          <button (click)="deleteRecipe(recipe._id)" class="btn btn-danger py-3 px-5 rounded-pill">
            Delete
          </button>

        </div>

      </div>
    </div>
  </div>
</div>
