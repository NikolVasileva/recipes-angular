<div class="bg-light rounded service-item">
    <div class="service-content d-flex align-items-center justify-content-center p-4">
      <div class="service-content-icon text-center">
    
        <img class="img-fluid rounded animated zoomIn fixed-img" src="{{ recipe?.imageUrl }}" alt="{{ recipe?.title }}" />
  
        <h4 class="mb-3">{{ recipe?.title }}</h4>
        <!-- <p class="mb-4">{{ recipe?.description }}</p> -->

        <div class="d-flex align-items-center justify-content-center mb-3">
            <i class="fas fa-utensils text-primary me-2"></i>
            <span class="features">{{ recipe.servings }} servings</span>
        </div>
        <div class="d-flex align-items-center justify-content-center mb-3">
            <i class="fa fa-clock text-primary me-2"></i>
            <span>{{ recipe.cookTime }} mins</span>
        </div>
        <div class="d-flex align-items-center justify-content-center mb-3">
            <i class="fas fa-star text-primary me-2"></i>
            <span>{{ recipe.difficulty }}</span>
        </div>
  
        <a href="#" class="btn btn-primary px-4 py-2 rounded-pill">
          Read More
        </a>
      </div>
    </div>
  </div>
